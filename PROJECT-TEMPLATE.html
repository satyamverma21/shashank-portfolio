<!-- ============================================================
   PROJECT CARD TEMPLATE
   projects/PROJECT-TEMPLATE.html
   
   HOW TO ADD A NEW PROJECT:
   1. Copy the <article> block below into index.html inside .works-grid
   2. Add your project data object to the PROJECTS object in script.js
   3. Place images in /images and link them (or use gradient placeholders)
   4. Place PDF files in /files and update the downloads array
   ============================================================ -->

<!-- STEP 1: Add this card to index.html → .works-grid -->
<article class="project-card reveal" data-project="05" onclick="openProject('myproject')">
  <div class="card-image">
    <!-- Option A: CSS gradient placeholder (no image needed) -->
    <div class="card-img-inner" style="background: linear-gradient(135deg, #B0B8C0 0%, #6A7880 100%)"></div>

    <!-- Option B: Real image (uncomment and update src) -->
    <!-- <img class="card-img-inner" src="images/myproject-cover.jpg" alt="My Project" style="object-fit:cover;width:100%;height:100%"> -->

    <div class="card-overlay">
      <span class="card-view">View Project</span>
    </div>
    <div class="card-number">05</div>
  </div>
  <div class="card-info">
    <h3 class="card-title">My Project Title</h3>
    <p class="card-meta">Project Type · Year</p>
    <p class="card-desc">A short one or two sentence description of the project. Keep it punchy and intriguing.</p>
    <div class="card-tags">
      <span>Tag One</span>
      <span>Tag Two</span>
      <span>Tag Three</span>
    </div>
  </div>
</article>
